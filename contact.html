<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Contacto</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="form-container">
    <form action="/registro" method="POST">
  <label for="nombre">Nombre completo:</label>
  <input type="text" id="nombre" name="nombre"
         placeholder="Ej: Juan Pérez" required minlength="3">

  <label for="email">Correo electrónico:</label>
  <input type="email" id="email" name="email"
         placeholder="juan@mail.com" required>

  <label for="telefono">Teléfono:</label>
  <input type="tel" id="telefono" name="telefono"
         pattern="[0-9]{10}" placeholder="Ej: 3871234567">

  <label for="mensaje">Mensaje:</label>
  <textarea id="mensaje" name="mensaje" required minlength="10"></textarea>

  <label for="edad">Edad:</label>
  <input type="number" id="edad" name="edad"
         min="16" max="99" required>

  <label for="pass">Contraseña:</label>
  <input type="password" id="pass" name="password"
         minlength="8" required>

  <label for="carrera">Carrera:</label>
  <select id="carrera" name="carrera" required>
    <option value="">-- Seleccioná --</option>
    <option value="sistemas">Análisis de Sistemas</option>
    <option value="redes">Redes</option>
    <option value="programacion">Programación</option>

  <input type="checkbox" id="terminos" name="terminos" required>
  <label for="terminos">Acepto los términos y condiciones</label>
</select>
  <button type="submit">Registrarse</button>
</form>
</div>
</body>
</html>
